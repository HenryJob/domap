{% extends 'base.html' %}
{% block title %}Eliminar dirección · Mordé{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="product-card p-4 text-center">
        <h4 class="mb-3">¿Eliminar "{{ address.label }}"?</h4>
        <p class="text-muted small">{{ address.address }}</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn-morde-amber w-100 justify-content-center mb-2">Eliminar</button>
          <a href="{% url 'accounts:profile' %}" class="btn-morde-light w-100 justify-content-center">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
