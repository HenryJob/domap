{% load static morde_extras %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de analítica · Mordé</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/morde.css' %}?v={{ STATIC_VERSION }}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="dash-body">
  <header class="morde-header py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span class="morde-logo"><i class="bi bi-graph-up-arrow me-1"></i> Panel de analítica</span>
      <div class="d-flex gap-2">
        <a href="{% url 'orders:manual_sale_list' %}" class="btn-morde-light bg-white btn-sm"><i class="bi bi-whatsapp"></i> Ventas manuales</a>
        <a href="{% url 'core:home' %}" class="btn-morde-light bg-white btn-sm"><i class="bi bi-arrow-left"></i> Volver al sitio</a>
      </div>
    </div>
  </header>

  <div class="container pb-5">
    {% include 'analytics/_dashboard_content.html' %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/es.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (!window.flatpickr) return;
      if (flatpickr.l10ns && flatpickr.l10ns.es) flatpickr.localize(flatpickr.l10ns.es);
      flatpickr('.js-date-picker', {
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'j M Y',
        disableMobile: true,
      });
    });
  </script>
  <script src="{% static 'js/dashboard-charts.js' %}?v={{ STATIC_VERSION }}"></script>
</body>
</html>
