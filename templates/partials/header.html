{% load static %}
<header class="morde-header">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
    <a href="{% url 'core:home' %}" class="d-flex align-items-center gap-2 text-decoration-none">
      <span class="morde-logo">Mordé</span>
    </a>
    <nav class="d-none d-lg-flex gap-4">
      {% include 'partials/_nav_links.html' %}
    </nav>
    <div class="d-flex align-items-center gap-3">
      <a href="{% url 'cart:cart_detail' %}" class="morde-cart-icon js-cart-icon" title="Carrito">
        <i class="bi bi-bag"></i>
        {% if cart_count > 0 %}<span class="morde-badge">{{ cart_count }}</span>{% endif %}
      </a>
      <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#morde-mobile-nav" aria-controls="morde-mobile-nav" aria-label="Abrir menú">
        <i class="bi bi-list fs-3"></i>
      </button>
    </div>
  </div>
</header>

<div class="offcanvas offcanvas-end" tabindex="-1" id="morde-mobile-nav" aria-labelledby="morde-mobile-nav-label">
  <div class="offcanvas-header">
    <span class="morde-logo" id="morde-mobile-nav-label">Mordé</span>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column gap-3">
    {% include 'partials/_nav_links.html' %}
  </div>
</div>
