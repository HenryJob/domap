{# Parámetro esperado: steps = lista de {title, description} #}
<section class="steps-band">
  <div class="container">
    <h2 class="text-center mb-5">Así funciona <span class="divider-heart"><i class="bi bi-heart-fill"></i></span></h2>
    <div class="row g-4 justify-content-center">
      {% for step in steps %}
        <div class="col-6 col-md-{% widthratio 12 steps|length 1 %} text-center">
          <div class="step-circle">
            <span class="step-number">{{ forloop.counter }}</span>
            <span style="font-size:1.4rem;">{{ step.icon }}</span>
          </div>
          <h6 class="text-white">{{ step.title }}</h6>
          <p class="small mb-0" style="color: rgba(255,255,255,0.75);">{{ step.description }}</p>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
