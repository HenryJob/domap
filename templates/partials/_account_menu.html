{% if request.user.is_authenticated %}
  <div class="dropdown">
    <a href="#" class="morde-cart-icon" title="Mi cuenta" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="bi bi-person-circle"></i>
    </a>
    <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" href="{% url 'accounts:profile' %}">Mi cuenta</a></li>
      <li><a class="dropdown-item" href="{% url 'accounts:order_history' %}">Mis pedidos</a></li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <form method="post" action="{% url 'accounts:logout' %}" class="m-0 p-0">
          {% csrf_token %}
          <button type="submit" class="dropdown-item">Salir</button>
        </form>
      </li>
    </ul>
  </div>
{% else %}
  <a href="{% url 'accounts:login' %}" class="morde-cart-icon" title="Ingresar">
    <i class="bi bi-person"></i>
  </a>
{% endif %}
