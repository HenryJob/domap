{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mordé · Waffles saludables{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/morde.css' %}?v={{ STATIC_VERSION }}" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'partials/header.html' %}

  <!-- {# Asegura que la cookie csrftoken siempre se emita, incluso en páginas sin
     formularios visibles (ej. Inicio/Menú), para que los fetch() de
     carrito/favoritos funcionen en la primera visita. #} -->
  <form id="csrf-bootstrap" hidden>{% csrf_token %}</form>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>window.MORDE_PAGEVIEW_ID = {{ current_pageview.id|default_if_none:"null" }};</script>
  <script src="{% static 'js/tracking.js' %}?v={{ STATIC_VERSION }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
