{% extends 'panel/_base.html' %}
{% block title %}Confirmar eliminación{% endblock %}
{% block panel_content %}
<div class="chart-card" style="max-width: 480px;">
  <h5 class="mb-3"><i class="bi bi-exclamation-triangle text-danger"></i> ¿Eliminar "{{ object }}"?</h5>
  <p class="text-muted">Esta acción no se puede deshacer.</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Eliminar</button>
    <a href="{% url cancel_url %}" class="btn-morde-light bg-white">Cancelar</a>
  </form>
</div>
{% endblock %}
